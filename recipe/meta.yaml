{% set name = "feedgenerator" %}
{% set version = "2.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/feedgenerator-{{ version }}.tar.gz
  sha256: 0eaa955f1f0bcb5b87ac195af740f06ff9fff4a40ed30b8a7c6bbebb264d4dd1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - tzdata
    - python >={{ python_min }}
    - python-tzdata  # [win]
    - __unix  # [unix]
    - __win   # [win]

test:
  imports:
    - feedgenerator
    - feedgenerator.django
    - feedgenerator.django.utils
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/getpelican/feedgenerator
  summary: Standalone version of django.utils.feedgenerator
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
    - moorepants
